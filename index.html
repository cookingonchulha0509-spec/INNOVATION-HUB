<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tapcraves - Video to 360 Auto-Generator</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background-color: #111; color: white; overflow: hidden; }
        
        #camera-screen, #preview-screen { width: 100vw; height: 100vh; display: flex; flex-direction: column; position: absolute; }
        #preview-screen { display: none; background-color: #1a1a1a; justify-content: center; align-items: center; }

        #video-container { position: relative; flex-grow: 1; display: flex; justify-content: center; align-items: center; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Center Guide */
        #guide-box {
            position: absolute; width: 250px; height: 250px; border: 2px solid rgba(255, 255, 255, 0.4); border-radius: 20px;
            display: flex; justify-content: center; align-items: center; pointer-events: none;
        }
        #guide-box::before { content: 'Keep Burger Here'; color: rgba(255,255,255,0.5); font-weight: bold; }
        
        /* UI Controls */
        #ui-panel { position: absolute; bottom: 0; width: 100%; padding: 30px 20px; text-align: center; background: linear-gradient(transparent, rgba(0,0,0,0.9)); }
        
        /* Record Button */
        #record-btn { 
            width: 80px; height: 80px; border-radius: 50%; background-color: #FF4757; border: 5px solid white;
            cursor: pointer; transition: 0.2s; outline: none; margin: 0 auto;
        }
        #record-btn.recording { transform: scale(1.2); border-color: #FF4757; background-color: white; }
        
        #instruction { font-size: 16px; font-weight: bold; margin-bottom: 20px; color: #fff; text-shadow: 1px 1px 5px black; }

        /* 360 Viewer */
        #viewer-container { width: 100%; max-width: 400px; height: 400px; position: relative; touch-action: pan-y; cursor: grab; }
        #product-image { width: 100%; height: 100%; object-fit: contain; pointer-events: none; border-radius: 10px; }
        
        #retake-btn { position: absolute; bottom: 30px; padding: 12px 30px; background: #333; color: white; border: none; border-radius: 20px; font-weight: bold; }
        canvas { display: none; }
    </style>
</head>
<body>

    <!-- SCREEN 1: Video Record -->
    <div id="camera-screen">
        <div id="video-container">
            <video id="camera" autoplay playsinline></video>
            <div id="guide-box"></div>
        </div>
        <div id="ui-panel">
            <div id="instruction">Hold button & move camera around the burger</div>
            <button id="record-btn"></button>
            <div id="frame-count" style="margin-top: 10px; color: #aaa; font-size: 12px;">Frames: 0</div>
        </div>
    </div>

    <!-- SCREEN 2: 360 Preview -->
    <div id="preview-screen">
        <div id="viewer-container">
            <div style="position:absolute; top:-30px; width:100%; text-align:center; color:#FF4757; font-weight:bold;">Ultra-Smooth 360 View</div>
            <img id="product-image" src="">
        </div>
        <button id="retake-btn" onclick="resetSystem()">Retake Video</button>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('camera');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const recordBtn = document.getElementById('record-btn');
        const instruction = document.getElementById('instruction');
        const frameCountTxt = document.getElementById('frame-count');
        
        let videoStream = null;
        let isRecording = false;
        let captureInterval;
        let framesArray = []; // Frames yahan save honge
        let totalFrames = 0;

        // Start Camera
        async function startCamera() {
            try {
                videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: 720, height: 720 } });
                video.srcObject = videoStream;
            } catch (err) { alert("Camera issue: " + err); }
        }
        startCamera();

        // --- RECORDING LOGIC (Extract Frames automatically) ---
        function startRecording() {
            framesArray = [];
            isRecording = true;
            recordBtn.classList.add('recording');
            instruction.innerText = "Recording... Move slowly around the burger!";
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            // Har 100 millisecond me ek frame nikal lo (1 second me 10 frames = Ultra smooth)
            captureInterval = setInterval(() => {
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                // Quality 0.6 rakhi hai taaki memory crash na ho
                framesArray.push(canvas.toDataURL('image/jpeg', 0.6));
                frameCountTxt.innerText = `Frames: ${framesArray.length}`;
            }, 100); 
        }

        function stopRecording() {
            if (!isRecording) return;
            isRecording = false;
            clearInterval(captureInterval);
            recordBtn.classList.remove('recording');
            
            totalFrames = framesArray.length;
            
            if(totalFrames < 10) {
                alert("Too short! Please record for at least 2-3 seconds.");
                framesArray = [];
                instruction.innerText = "Hold button & move camera around the burger";
                return;
            }
            
            showPreview();
        }

        // Pointer events support mobile touch AND mouse click
        recordBtn.addEventListener('pointerdown', startRecording);
        window.addEventListener('pointerup', stopRecording); // Screen pe kahin bhi chhodne par ruk jayega

        // --- 360 PREVIEW LOGIC ---
        let currentFrameIndex = 0;
        let isDragging = false;
        let startX = 0;
        let startFrameIndex = 0;
        const sensitivity = 8; // Kam sensitivity = smooth movement

        function showPreview() {
            document.getElementById('camera-screen').style.display = 'none';
            document.getElementById('preview-screen').style.display = 'flex';
            
            const productImg = document.getElementById('product-image');
            productImg.src = framesArray[0]; // Load first frame
            
            const viewer = document.getElementById('viewer-container');
            
            viewer.onpointerdown = (e) => {
                isDragging = true;
                startX = e.clientX;
                startFrameIndex = currentFrameIndex;
            };
            
            window.onpointermove = (e) => {
                if (!isDragging) return;
                let moveDistance = e.clientX - startX;
                let frameShift = Math.floor(moveDistance / sensitivity);
                
                // Calculate new frame with loop
                currentFrameIndex = (startFrameIndex - frameShift) % totalFrames;
                if (currentFrameIndex < 0) currentFrameIndex += totalFrames;
                
                productImg.src = framesArray[currentFrameIndex];
            };
            
            window.onpointerup = () => { isDragging = false; };
        }

        function resetSystem() {
            document.getElementById('preview-screen').style.display = 'none';
            document.getElementById('camera-screen').style.display = 'flex';
            instruction.innerText = "Hold button & move camera around the burger";
            frameCountTxt.innerText = "Frames: 0";
        }
    </script>
</body>
</html>
